<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz App</title>
    <link
      href="https://fonts.googleapis.com/css?family=Poppins:100,100italic,200,200italic,300,300italic,regular,italic,500,500italic,600,600italic,700,700italic,800,800italic,900,900italic"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <div class="screen activ" id="start-screen">
        <h1>Quiz Time!</h1>
        <p>Test your knowledge with these fun questions</p>
        <button class="start-btn">Start Quiz</button>
      </div>

      <div class="screen active" id="quiz-screen">
        <div class="quiz-header">
          <h2 id="question-text">Question goes here</h2>
          <div class="quiz-info">
            <p>
              Question <span id="current-question">1</span> of
              <span id="total-question">5</span>
            </p>

            <p>Score: <span id="score">0</span></p>
          </div>
        </div>

        <div class="answer-container" id="answer-container">
          <!-- Answer will inserted here with js code -->
           <button class="answer-btn">London</button>
           <button class="answer-btn">London</button>
           <button class="answer-btn">London</button>
           <button class="answer-btn">London</button>
        </div>

        <div class="progress-bar">
          <div class="progress" id="progress"></div>
        </div>
      </div>

      <div class="screen" id="result-screen">
        <h1>Quiz Result!</h1>
        <div class="result-info">
          <p>
            You scored <span id="final-score">0</span> out of
            <span id="max-score">5</span>
          </p>
          <div id="result-message">Good job!</div>
        </div>
        <button id="restart-quiz">Restart Quiz</button>
      </div>
    </div>
  </body>
</html>
